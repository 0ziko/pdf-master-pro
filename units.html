<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unit Converters — SnakeConverter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .unit-card-select {
      flex: 0 0 auto; min-width: 150px;
      background: rgba(255,255,255,.06); border: 1px solid var(--border-subtle);
      border-radius: .6rem; padding: .52rem .7rem; color: var(--text-primary);
      font-size: .82rem; outline: none;
    }
    .unit-results { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: .45rem; margin-top: .8rem; }
    .unit-result-item {
      background: rgba(255,255,255,.04); border: 1px solid var(--border-subtle);
      border-radius: .7rem; padding: .55rem .75rem; cursor: pointer; transition: background .15s;
      display: flex; flex-direction: column; gap: .12rem;
    }
    .unit-result-item:hover { background: rgba(255,255,255,.08); }
    .unit-result-item.is-from { border-color: rgba(99,102,241,.5); background: rgba(99,102,241,.1); }
    .unit-result-label { display: flex; justify-content: space-between; font-size: .66rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
    .unit-result-sym { color: var(--text-dim); font-weight: 500; }
    .unit-result-val  { font-size: .95rem; font-weight: 800; color: var(--text-primary); word-break: break-all; }
    .copied-flash { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
      background: rgba(16,185,129,.9); color: #fff; padding: .4rem 1.2rem; border-radius: 999px;
      font-size: .78rem; font-weight: 700; pointer-events: none; opacity: 0; transition: opacity .2s; z-index: 999; }
    .copied-flash.show { opacity: 1; }
    .unit-input-row { display: flex; gap: .5rem; }
    .unit-input-row .input-field { flex: 1; }
  </style>
</head>
<body>
<div class="app-wrap">
  <div class="main-card">

    <!-- ── Header ── -->
    <header style="text-align:center;margin-bottom:1.5rem;position:relative;">
      <div class="lang-switcher">
        <button type="button" data-lang-btn="en" class="lang-btn lang-active">EN</button>
        <button type="button" data-lang-btn="tr" class="lang-btn">TR</button>
      </div>
      <a href="index.html" class="hub-back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        SnakeConverter
      </a>
      <div style="display:inline-flex;align-items:center;gap:.4rem;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:999px;padding:.2rem .85rem;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#a5b4fc;margin-bottom:.9rem;">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
        <span>Instant · Accurate · Private</span>
      </div>
      <h1 class="site-title" style="background:linear-gradient(135deg,#fff 0%,#a5b4fc 40%,#818cf8 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Unit Converters</h1>
      <p class="site-sub">11 categories · 90+ units — click any result to copy</p>
    </header>

    <!-- ── Jump Nav (all categories, wrapping) ── -->
    <nav class="jump-nav" id="jumpNav"></nav>

    <!-- ── All Unit Cards (generated by JS) ── -->
    <div id="unitsContainer"></div>

    <div class="copied-flash" id="copiedFlash">Copied!</div>

    <div style="margin-top:2.5rem;text-align:center;font-size:.72rem;color:var(--text-dim);">
      © 2026 SnakeConverter · All conversions happen in your browser
    </div>

  </div>
</div>

<script src="js/i18n.js"></script>
<script src="js/units.js"></script>
<script>
(function () {
  const { CATS, convertAll } = window.SnakeUnits;
  const jumpNav   = document.getElementById("jumpNav");
  const container = document.getElementById("unitsContainer");
  const flash     = document.getElementById("copiedFlash");

  function copyVal(val) {
    navigator.clipboard.writeText(val).catch(() => {});
    flash.classList.add("show");
    clearTimeout(flash._t);
    flash._t = setTimeout(() => flash.classList.remove("show"), 1600);
  }

  Object.entries(CATS).forEach(([catId, cat]) => {
    /* ── Jump nav link ── */
    const a = document.createElement("a");
    a.href = "#" + catId;
    a.className = "jump-link";
    a.textContent = (cat.icon ? cat.icon + " " : "") + cat.label;
    jumpNav.appendChild(a);

    /* ── Category card ── */
    const sec = document.createElement("section");
    sec.id = catId;
    sec.className = "tool-page-section";

    const unitOptions = cat.units.map(u =>
      `<option value="${u.id}">${u.label} (${u.sym})</option>`
    ).join("");

    sec.innerHTML = `
      <div class="tps-header">
        <span class="tps-icon">${cat.icon || "📐"}</span>
        <div>
          <div class="tps-title">${cat.label}</div>
          <div class="tps-desc">${cat.units.map(u => u.sym).join("  ·  ")}</div>
        </div>
      </div>
      <div class="unit-input-row">
        <input type="number" class="input-field u-val" value="1" placeholder="Value…" />
        <select class="unit-card-select u-from">${unitOptions}</select>
      </div>
      <div class="unit-results u-results"></div>
    `;
    container.appendChild(sec);

    /* ── Wire events ── */
    const valEl  = sec.querySelector(".u-val");
    const fromEl = sec.querySelector(".u-from");
    const resEl  = sec.querySelector(".u-results");

    function render() {
      const val  = parseFloat(valEl.value);
      const from = fromEl.value;
      const rows = convertAll(catId, val, from);
      resEl.innerHTML = rows.map(r => `
        <div class="unit-result-item${r.isFrom ? " is-from" : ""}" title="Click to copy">
          <div class="unit-result-label">
            <span>${r.label}</span>
            <span class="unit-result-sym">${r.sym}</span>
          </div>
          <div class="unit-result-val">${isNaN(val) ? "—" : r.result}</div>
        </div>
      `).join("");
      resEl.querySelectorAll(".unit-result-item").forEach((item, i) => {
        item.addEventListener("click", () => copyVal(rows[i].result));
      });
    }

    valEl.addEventListener("input", render);
    fromEl.addEventListener("change", render);
    render();
  });

  /* ── Focus mode: navigated via hash → show only that tool ── */
  const hash = location.hash.slice(1);
  const allSections = document.querySelectorAll('.tool-page-section');
  const jumpNavEl = document.getElementById('jumpNav');
  if (hash && jumpNavEl && allSections.length) {
    const target = document.getElementById(hash);
    if (target && target.classList.contains('tool-page-section')) {
      allSections.forEach(s => { if (s !== target) s.style.display = 'none'; });
      const navLinks = Array.from(jumpNavEl.querySelectorAll('a.jump-link'));
      const opts = navLinks.map(l => {
        const id = (l.getAttribute('href') || '').replace('#', '');
        return `<option value="${id}"${id === hash ? ' selected' : ''}>${l.textContent.trim()}</option>`;
      }).join('');
      const bar = document.createElement('div');
      bar.className = 'focus-bar';
      bar.innerHTML = `<a href="${location.pathname}" class="focus-back"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>All converters</a><span class="focus-bar-sep"></span><select class="focus-select">${opts}</select>`;
      jumpNavEl.replaceWith(bar);
      bar.querySelector('.focus-select').addEventListener('change', function () {
        const id = this.value;
        allSections.forEach(s => { s.style.display = s.id === id ? '' : 'none'; });
        history.replaceState(null, '', '#' + id);
      });
    }
  }
})();
</script>
</body>
</html>
