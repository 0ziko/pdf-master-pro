name = "snakeconverter-share"
main = "index.js"
compatibility_date = "2024-01-01"

[[r2_buckets]]
binding    = "PDF_BUCKET"
bucket_name = "snakeconverter-pdfs"

[triggers]
crons = ["0 3 * * *"]   # Daily cleanup at 03:00 UTC

[[routes]]
pattern = "snakeconverter.com/api/share/*"
zone_name = "snakeconverter.com"
