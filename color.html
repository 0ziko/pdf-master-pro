<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Tools — SnakeConverter</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/app.css" />
  <style>
    .color-swatch { width:80px; height:80px; border-radius:.85rem; border:2px solid rgba(255,255,255,.12);
      flex-shrink:0; transition:background .2s; cursor:pointer; }
    .color-row { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:.5rem; margin-top:.8rem; }
    .color-item { display:flex; flex-direction:column; gap:.2rem; background:rgba(255,255,255,.04);
      border:1px solid var(--border-subtle); border-radius:.75rem; padding:.65rem .8rem; }
    .color-label { font-size:.67rem; font-weight:800; text-transform:uppercase; letter-spacing:.07em; color:var(--text-muted); }
    .color-val   { font-family:monospace; font-size:.85rem; color:var(--text-primary); font-weight:700; }
    .color-copy  { font-size:.65rem; color:var(--text-dim); cursor:pointer; align-self:flex-end; margin-top:auto;
      padding:.1rem .35rem; border:1px solid var(--border-subtle); border-radius:.3rem; background:transparent; transition:all .15s; }
    .color-copy:hover { color:var(--text-muted); }
    .contrast-block { border-radius:1rem; padding:1.2rem 1.4rem; margin-top:.8rem; }
    .wcag-tag { display:inline-flex; align-items:center; gap:.3rem; padding:.2rem .6rem; border-radius:999px;
      font-size:.7rem; font-weight:800; margin:.2rem; }
    .wcag-pass { background:rgba(16,185,129,.2); color:#6ee7b7; }
    .wcag-fail { background:rgba(248,113,113,.15); color:#f87171; }
    .shade-grid { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.8rem; }
    .shade-cell { display:flex; flex-direction:column; align-items:center; gap:.25rem; }
    .shade-swatch { width:48px; height:48px; border-radius:.5rem; border:1px solid rgba(255,255,255,.1); cursor:pointer; transition:transform .15s; }
    .shade-swatch:hover { transform:scale(1.12); }
    .shade-label { font-size:.6rem; font-family:monospace; color:var(--text-muted); }
    .grad-preview { height:80px; border-radius:.85rem; margin-top:.6rem; transition:all .3s; }
    .grad-css  { background:rgba(0,0,0,.3); border:1px solid var(--border-subtle); border-radius:.6rem;
      padding:.5rem .75rem; font-family:monospace; font-size:.78rem; color:#86efac; word-break:break-all; margin-top:.5rem; }
    .color-input-wrap { display:flex; gap:.6rem; align-items:center; margin-bottom:.6rem; }
    .color-picker-native { width:56px; height:40px; padding:2px; border:1px solid var(--border-subtle); border-radius:.5rem; cursor:pointer; background:transparent; }
    .tab-row-btns { display:flex; gap:.4rem; margin-bottom:.6rem; flex-wrap:wrap; }
    .tab-row-btn { padding:.3rem .7rem; border:1px solid var(--border-subtle); border-radius:.5rem;
      font-size:.72rem; font-weight:700; background:transparent; color:var(--text-muted); cursor:pointer; transition:all .15s; }
    .tab-row-btn.active { background:rgba(217,119,6,.2); border-color:#d97706; color:#fcd34d; }
  </style>
</head>
<body>
<div class="app-wrap">
  <div class="main-card">

    <!-- ── Header ──────────────────────────── -->
    <header style="text-align:center;margin-bottom:1.5rem;position:relative;">
      <div class="lang-switcher">
        <button type="button" data-lang-btn="en" class="lang-btn lang-active">EN</button>
        <button type="button" data-lang-btn="tr" class="lang-btn">TR</button>
      </div>

      <a href="index.html" class="hub-back-link">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
        SnakeConverter
      </a>

      <div style="display:inline-flex;align-items:center;gap:.4rem;background:rgba(217,119,6,.12);border:1px solid rgba(217,119,6,.3);border-radius:999px;padding:.2rem .85rem;font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#fcd34d;margin-bottom:.9rem;">
        <svg width="10" height="10" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
        <span>HEX · RGB · HSL · CMYK · WCAG</span>
      </div>

      <h1 class="site-title" style="background:linear-gradient(135deg,#fbbf24,#f472b6,#818cf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Color Tools</h1>
      <p class="site-sub">Convert, contrast-check, generate shades &amp; gradients</p>
    </header>

    <!-- ── Tab nav ───────────────────────────── -->
    <nav class="tab-nav tools-tab-nav">
      <button type="button" data-tab="convert"  class="tab-btn tab-active"><span>Convert</span></button>
      <button type="button" data-tab="contrast" class="tab-btn"><span>Contrast</span></button>
      <button type="button" data-tab="shades"   class="tab-btn"><span>Shades</span></button>
      <button type="button" data-tab="gradient" class="tab-btn"><span>Gradient</span></button>
    </nav>

    <!-- ── Color Convert ── -->
    <div data-panel="convert">
      <div class="tab-row-btns">
        <button type="button" class="tab-row-btn active" data-from="hex"  onclick="convMode('hex')">HEX</button>
        <button type="button" class="tab-row-btn" data-from="rgb"  onclick="convMode('rgb')">RGB</button>
        <button type="button" class="tab-row-btn" data-from="hsl"  onclick="convMode('hsl')">HSL</button>
        <button type="button" class="tab-row-btn" data-from="cmyk" onclick="convMode('cmyk')">CMYK</button>
      </div>
      <div class="color-input-wrap">
        <input type="color" id="conv-picker" class="color-picker-native" value="#6366f1" oninput="convPickerChanged()" />
        <input type="text"  id="conv-in" class="input-field" placeholder="#6366f1" oninput="convRun()" style="flex:1;font-family:monospace" value="#6366f1" />
        <button type="button" onclick="convRun()" class="btn-primary">Convert</button>
      </div>
      <div id="conv-swatch" class="color-swatch" style="background:#6366f1;margin-bottom:.8rem;width:100%;height:64px;border-radius:.85rem;"></div>
      <div id="conv-out" class="color-row"></div>
    </div>

    <!-- ── Contrast Checker ── -->
    <div data-panel="contrast" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem;">
        <div>
          <label style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:.3rem;">Foreground</label>
          <div class="color-input-wrap" style="margin-bottom:0">
            <input type="color" id="fg-picker" class="color-picker-native" value="#ffffff" oninput="document.getElementById('fg-in').value=this.value;contrastRun()" />
            <input type="text" id="fg-in" class="input-field" value="#ffffff" style="font-family:monospace" oninput="document.getElementById('fg-picker').value=this.value;contrastRun()" />
          </div>
        </div>
        <div>
          <label style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:.3rem;">Background</label>
          <div class="color-input-wrap" style="margin-bottom:0">
            <input type="color" id="bg-picker" class="color-picker-native" value="#1e1b4b" oninput="document.getElementById('bg-in').value=this.value;contrastRun()" />
            <input type="text" id="bg-in" class="input-field" value="#1e1b4b" style="font-family:monospace" oninput="document.getElementById('bg-picker').value=this.value;contrastRun()" />
          </div>
        </div>
      </div>
      <div id="contrast-preview" class="contrast-block" style="background:#1e1b4b;color:#fff">
        <p style="font-size:1.1rem;font-weight:700;margin:0 0 .3rem;">The quick brown fox jumps over the lazy dog</p>
        <p style="font-size:.8rem;margin:0">Small text sample for WCAG evaluation</p>
      </div>
      <div id="contrast-out" style="margin-top:.7rem"></div>
    </div>

    <!-- ── Shade Generator ── -->
    <div data-panel="shades" style="display:none">
      <div class="color-input-wrap">
        <input type="color" id="shade-picker" class="color-picker-native" value="#6366f1" oninput="document.getElementById('shade-in').value=this.value;shadesRun()" />
        <input type="text" id="shade-in" class="input-field" value="#6366f1" style="flex:1;font-family:monospace" oninput="shadesRun()" />
        <select id="shade-steps" class="calc-select" style="width:100px;background:rgba(255,255,255,.06);border:1px solid var(--border-subtle);border-radius:.6rem;padding:.55rem .7rem;color:var(--text-primary);font-size:.83rem;outline:none;" onchange="shadesRun()">
          <option value="10" selected>10 steps</option>
          <option value="20">20 steps</option>
          <option value="5">5 steps</option>
        </select>
      </div>
      <div id="shades-out" class="shade-grid"></div>
    </div>

    <!-- ── Gradient Builder ── -->
    <div data-panel="gradient" style="display:none">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin-bottom:.6rem;">
        <div>
          <label style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:.3rem;">Color 1</label>
          <div class="color-input-wrap" style="margin-bottom:0">
            <input type="color" id="g1-picker" class="color-picker-native" value="#6366f1" oninput="document.getElementById('g1-in').value=this.value;gradRun()" />
            <input type="text" id="g1-in" class="input-field" value="#6366f1" style="font-family:monospace" oninput="gradRun()" />
          </div>
        </div>
        <div>
          <label style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:.3rem;">Color 2</label>
          <div class="color-input-wrap" style="margin-bottom:0">
            <input type="color" id="g2-picker" class="color-picker-native" value="#ec4899" oninput="document.getElementById('g2-in').value=this.value;gradRun()" />
            <input type="text" id="g2-in" class="input-field" value="#ec4899" style="font-family:monospace" oninput="gradRun()" />
          </div>
        </div>
      </div>
      <div style="display:flex;gap:.6rem;align-items:center;margin-bottom:.6rem;">
        <div style="flex:1">
          <label style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:.3rem;">Angle</label>
          <input type="range" id="grad-angle" min="0" max="360" value="135" oninput="document.getElementById('grad-angle-val').textContent=this.value+'°';gradRun()" class="range-input" style="width:100%" />
        </div>
        <span id="grad-angle-val" style="font-size:.9rem;font-weight:700;color:#a5b4fc;min-width:40px">135°</span>
        <div>
          <label style="font-size:.7rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;display:block;margin-bottom:.3rem;">Type</label>
          <select id="grad-type" class="calc-select" style="background:rgba(255,255,255,.06);border:1px solid var(--border-subtle);border-radius:.6rem;padding:.45rem .6rem;color:var(--text-primary);font-size:.8rem;outline:none;" onchange="gradRun()">
            <option value="linear">Linear</option>
            <option value="radial">Radial</option>
          </select>
        </div>
      </div>
      <div id="grad-preview" class="grad-preview"></div>
      <div style="display:flex;align-items:center;gap:.5rem;margin-top:.5rem;">
        <div id="grad-css" class="grad-css" style="flex:1"></div>
        <button type="button" onclick="copyEl('grad-css')" class="btn-secondary">Copy</button>
      </div>
    </div>

    <div style="margin-top:2.5rem;text-align:center;font-size:.72rem;color:var(--text-dim);">
      © 2026 SnakeConverter &nbsp;·&nbsp; All processing happens in your browser
    </div>

  </div><!-- /main-card -->
</div><!-- /app-wrap -->

<script src="js/i18n.js"></script>
<script src="js/color-tools.js"></script>
<script>
/* ── Tab switching ── */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("tab-active"));
    document.querySelectorAll("[data-panel]").forEach(p => p.style.display = "none");
    btn.classList.add("tab-active");
    document.querySelector(`[data-panel="${btn.dataset.tab}"]`).style.display = "";
    history.replaceState(null,"","#"+btn.dataset.tab);
  });
});
const hash = location.hash.replace("#","");
if (hash) { const b = document.querySelector(`[data-tab="${hash}"]`); if(b) b.click(); }

const CT = window.ColorTools;

function copyEl(id) { navigator.clipboard.writeText(document.getElementById(id).textContent||document.getElementById(id).value||"").catch(()=>{}); }

/* ── Convert ── */
let convFrom = "hex";
function convMode(from) {
  convFrom = from;
  document.querySelectorAll("[data-from]").forEach(b => b.classList.toggle("active", b.dataset.from === from));
  const map = { hex:"e.g. #6366f1", rgb:"e.g. 99, 102, 241", hsl:"e.g. 239, 84%, 67%", cmyk:"e.g. 59, 58, 0, 5" };
  document.getElementById("conv-in").placeholder = map[from];
  convRun();
}
function convPickerChanged() {
  convFrom = "hex";
  document.querySelectorAll("[data-from]").forEach(b => b.classList.toggle("active", b.dataset.from === "hex"));
  document.getElementById("conv-in").value = document.getElementById("conv-picker").value;
  convRun();
}
function convRun() {
  const r = CT.convertColor(document.getElementById("conv-in").value, convFrom);
  if (!r) return;
  document.getElementById("conv-swatch").style.background = r.hex;
  try { document.getElementById("conv-picker").value = r.hex; } catch(e) {}
  const items = [
    { label:"HEX",  val: r.hex },
    { label:"RGB",  val: `rgb(${r.rgb.r}, ${r.rgb.g}, ${r.rgb.b})` },
    { label:"HSL",  val: `hsl(${r.hsl.h}, ${r.hsl.s}%, ${r.hsl.l}%)` },
    { label:"CMYK", val: `cmyk(${r.cmyk.c}%, ${r.cmyk.m}%, ${r.cmyk.y}%, ${r.cmyk.k}%)` },
  ];
  document.getElementById("conv-out").innerHTML = items.map(i => `
    <div class="color-item">
      <div class="color-label">${i.label}</div>
      <div class="color-val">${i.val}</div>
      <button class="color-copy" onclick="navigator.clipboard.writeText('${i.val}')">Copy</button>
    </div>
  `).join("");
}
convRun();

/* ── Contrast ── */
function contrastRun() {
  const fg = document.getElementById("fg-in").value;
  const bg = document.getElementById("bg-in").value;
  const preview = document.getElementById("contrast-preview");
  preview.style.background = bg; preview.style.color = fg;
  const r = CT.contrastRatio(fg, bg);
  if (!r) return;
  const badge = (pass, label) => `<span class="wcag-tag ${pass?"wcag-pass":"wcag-fail"}">${pass?"✓":"✗"} ${label}</span>`;
  document.getElementById("contrast-out").innerHTML = `
    <div style="background:rgba(255,255,255,.04);border:1px solid var(--border-subtle);border-radius:.85rem;padding:.9rem 1rem;">
      <div style="font-size:2rem;font-weight:900;color:${r.ratio>=4.5?"#6ee7b7":r.ratio>=3?"#fbbf24":"#f87171"}">${r.ratio}:1</div>
      <div style="font-size:.75rem;color:var(--text-muted);margin:.3rem 0 .6rem">Contrast Ratio</div>
      ${badge(r.aaSmall,"AA Small")} ${badge(r.aaLarge,"AA Large")} ${badge(r.aaaSmal,"AAA Small")} ${badge(r.aaaLarge,"AAA Large")}
    </div>
  `;
}
contrastRun();

/* ── Shades ── */
function shadesRun() {
  const hex = document.getElementById("shade-in").value;
  const steps = parseInt(document.getElementById("shade-steps").value);
  const shades = CT.generateShades(hex, steps);
  document.getElementById("shades-out").innerHTML = shades.map(s => `
    <div class="shade-cell">
      <div class="shade-swatch" style="background:${s.hex}" title="${s.hex}" onclick="navigator.clipboard.writeText('${s.hex}')"></div>
      <div class="shade-label">${s.hex}</div>
      <div class="shade-label" style="color:var(--text-dim)">L:${s.l}%</div>
    </div>
  `).join("");
}
shadesRun();

/* ── Gradient ── */
function gradRun() {
  const c1 = document.getElementById("g1-in").value;
  const c2 = document.getElementById("g2-in").value;
  const angle = document.getElementById("grad-angle").value;
  const type  = document.getElementById("grad-type").value;
  const css = CT.gradientCSS(c1, c2, angle, type);
  document.getElementById("grad-preview").style.background = css;
  document.getElementById("grad-css").textContent = `background: ${css};`;
}
gradRun();
</script>
</body>
</html>
